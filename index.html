<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bean Archive</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
<h1>Bean Archive</h1>
<p>Every bean has a story.</p>
</header>

<div class="toolbar">
<input id="search" placeholder="検索...">
<button id="addBtn">＋ New Bean</button>
</div>

<main id="beanList"></main>

<dialog id="dialog">
<form id="beanForm" method="dialog">
<h2>Bean</h2>
<input id="name" placeholder="Bean Name" required>
<input id="country" placeholder="Country">
<input id="region" placeholder="Region">
<input id="process" placeholder="Process">
<div class="buttons">
<button value="cancel">キャンセル</button>
<button id="saveBtn" value="default">保存</button>
</div>
</form>
</dialog>

<script src="script.js"></script>
</body>
</html>
